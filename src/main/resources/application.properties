############################
# Application
############################
spring.application.name=spring-petclinic
server.port=8080

# database selector (used in sql init paths)
database=mysql


############################
# Datasource (MySQL)
############################
spring.datasource.url=jdbc:mysql://petclinic-mysql:3306/petclinic?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=petclinic
spring.datasource.password=petclinic
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


############################
# JPA / Hibernate
############################
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


############################
# SQL Initialization
############################
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/${database}/schema.sql
spring.sql.init.data-locations=classpath:db/${database}/data.sql


############################
# Thymeleaf
############################
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false


############################
# Internationalization
############################
spring.messages.basename=messages/messages


############################
# Actuator
############################
management.endpoints.web.exposure.include=*


############################
# Logging
############################
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF


############################
# Static Resources Cache
############################
spring.web.resources.cache.cachecontrol.max-age=12h

